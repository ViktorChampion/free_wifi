<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rostic's Free Wi-Fi</title>
    <style>
        /* Убираем все отступы и фиксируем экран */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Чтобы нельзя было скроллить */
            background-color: #000; /* Черный фон для эффекта */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            /* Растягиваем картинку, сохраняя пропорции */
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Заполнит весь экран, лишнее обрежет */
            /* Если хочешь, чтобы картинка была видна целиком без обрезки, 
               замени 'cover' на 'contain' */
        }
    </style>
</head>
<body>
    <img src="obeziyanka.jpg" alt="Wi-Fi">
</body>
</html>
